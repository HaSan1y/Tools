<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Popup Cookie Consent Box</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
</head>

<body>
    <div class="wrapper">
        <header>
            <box-icon class="bx bx-cookie" name='cookie' type='solid'></box-icon>
            <h2>Cookie Consent</h2>
        </header>

        <div class="data">
            <p>This website uses cookies, to help you have a superior and more admissible browsing experience<br /><a
                    href="https://www.datenschutz.org/cookie-consent/">Read more...</a>
            </p>
        </div>
        <div class="buttons">
            <button class="button" id="acceptBtn">Accept</button>
            <button class="button">Decline</button>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>
